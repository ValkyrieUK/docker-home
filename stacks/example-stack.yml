version: "3.8"

# Example multi-host stack demonstrating cross-node communication.
# Deploy from the manager node:
#   docker stack deploy -c example-stack.yml myapp

services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    networks:
      - app-net
    deploy:
      replicas: 1

  api:
    image: nginx:alpine
    networks:
      - app-net
    deploy:
      replicas: 1

  whoami:
    image: traefik/whoami:latest
    ports:
      - "9090:80"
    networks:
      - app-net
    deploy:
      mode: global  # one instance on every node

networks:
  app-net:
    driver: overlay
